<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PokeDeck Studio - Login</title>

        <link rel="stylesheet" href="src/css/main.css" />
    </head>
    <body>
        <main class="d-flex align-items-center justify-content-center min-vh-100 p-3 fade-in">
            <div class="login-card-container">
                <div class="row g-4 align-items-center">
                    <div
                        class="col-12 col-md-5 d-flex flex-column align-items-center text-center p-3 border-end border-md-none"
                    >
                        <span
                            class="badge rounded-pill bg-danger px-3 py-2 mb-4 fw-bold shadow-sm"
                            style="background-color: #9d4e54 !important"
                            >BEM-VINDO DE VOLTA!</span
                        >

                        <div class="pokeball-canvas mb-4" id="central-pokeball">
                            <div class="pokeball-button"></div>
                        </div>

                        <h2 class="pokedeck-title display-6 mb-2">PokeDeck Studio</h2>
                        <p class="text-muted px-3" style="font-size: 0.9rem">
                            Sua coleção está aguardando por você, Treinador!
                        </p>
                    </div>

                    <div class="col-12 col-md-7 ps-md-4">
                        <div class="mb-4">
                            <h3 class="fw-bold mb-1" style="color: #532626">Login</h3>
                            <p class="text-muted" style="font-size: 0.9rem">Entre para continuar sua jornada!</p>
                        </div>

                        <form action="index.html">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold small" style="color: #532626"
                                    >E-mail do Treinador</label
                                >
                                <input
                                    type="email"
                                    id="email"
                                    class="form-control form-control-custom"
                                    placeholder="ash@kanto.region"
                                    required
                                />
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold small" style="color: #532626"
                                    >Senha</label
                                >
                                <input
                                    type="password"
                                    id="password"
                                    class="form-control form-control-custom"
                                    placeholder="••••••••"
                                    required
                                />
                            </div>

                            <button type="submit" class="btn btn-custom btn-custom-primary w-100 py-3 mb-3 shadow-sm">
                                Entrar
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="18"
                                    height="18"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="feather feather-log-in ms-1"
                                >
                                    <path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8" />
                                    <polyline points="10 17 15 12 10 7" />
                                    <line x1="15" y1="12" x2="3" y2="12" />
                                </svg>
                            </button>

                            <div class="text-center mb-3">
                                <a href="#" class="text-decoration-none custom-link small fw-semibold"
                                    >Esqueceu sua senha?</a
                                >
                            </div>

                            <div class="d-flex align-items-center my-3">
                                <hr class="flex-grow-1 text-muted opacity-25" />
                                <span class="mx-3 text-muted small fw-bold">ou</span>
                                <hr class="flex-grow-1 text-muted opacity-25" />
                            </div>

                            <a
                                href="registro.html"
                                class="btn btn-custom btn-custom-info w-100 py-3 text-white shadow-sm"
                            >
                                Criar nova conta
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="18"
                                    height="18"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="feather feather-user-plus ms-1"
                                >
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                    <circle cx="8.5" cy="7" r="4" />
                                    <line x1="20" y1="8" x2="20" y2="14" />
                                    <line x1="23" y1="11" x2="17" y2="11" />
                                </svg>
                            </a>
                        </form>
                    </div>
                </div>

                <hr class="my-4 opacity-10" />

                <div class="starters-footer-pure">
                    <img
                        src="src/assets/img/squirtle.webp"
                        alt="Squirtle"
                        class="starter-thumbnail"
                        title="Squirtle quer entrar!"
                    />
                    <img
                        src="src/assets/img/bulbasaur.webp"
                        alt="Bulbasaur"
                        class="starter-thumbnail"
                        title="Bulbasaur quer entrar!"
                    />
                    <img
                        src="src/assets/img/charmander.webp"
                        alt="Charmander"
                        class="starter-thumbnail"
                        title="Charmander quer entrar!"
                    />
                </div>
            </div>
        </main>

        <footer class="text-center py-3 text-muted small position-absolute w-100" style="bottom: 10px">
            PokeDeck Studio &copy; 2026
        </footer>
    </body>
</html>
