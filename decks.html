<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PokeDeck Studio - Meus Decks</title>

        <link rel="stylesheet" href="src/css/main.css" />
    </head>
    <body>
        <header class="container py-3 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <a
                    href="index.html"
                    class="d-flex align-items-center justify-content-center bg-danger bg-opacity-10 rounded-circle text-danger"
                    style="width: 38px; height: 38px"
                    title="Voltar para a Home"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-arrow-left"
                    >
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </a>
                <h1 class="h3 fw-bold mb-0" style="color: #9d4e54; font-family: &quot;Outfit&quot;, sans-serif">
                    PokeDeck Studio
                </h1>
            </div>

            <nav class="capsule-navbar d-none d-md-inline-flex">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="cartas.html">Cartas</a>
                <a class="nav-link active" href="decks.html">Decks</a>
            </nav>

            <a
                href="login.html"
                class="d-flex align-items-center justify-content-center text-muted border border-2 rounded-circle"
                style="width: 42px; height: 42px; border-color: #7a8f75 !important"
                title="Acessar Área do Treinador"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#7a8f75"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-user"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </a>
        </header>

        <main class="container py-3 mb-5 pb-5">
            <section class="custom-card border-0 p-4 fade-in" style="background-color: #b6c9b1; border-radius: 2rem">
                <div
                    class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4"
                >
                    <h2 class="fw-bold h3 mb-0" style="color: #532626; font-family: &quot;Outfit&quot;">Meus Decks</h2>
                    <span
                        class="badge bg-white px-3 py-2 rounded-pill fw-bold text-dark shadow-sm border border-secondary border-opacity-10"
                        style="color: #532626 !important; font-size: 0.85rem"
                    >
                        Deck Ativo: <span style="color: #9d4e54">Deck Elétrico</span>
                    </span>
                </div>

                <div class="row g-4">
                    <div class="col-12 col-sm-6 col-lg-4">
                        <div class="add-deck-card h-100" data-bs-toggle="modal" data-bs-target="#addDeckModal">
                            <div class="add-icon-circle">+</div>
                            <span>Adicionar Novo Deck</span>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-4">
                        <div
                            class="custom-card h-100 bg-white border-0 d-flex flex-column justify-content-between p-4 shadow-sm position-relative"
                        >
                            <div class="mb-3">
                                <h3 class="h5 fw-bold mb-3" style="color: #532626; font-family: &quot;Outfit&quot;">
                                    Deck Elétrico
                                </h3>

                                <div class="d-flex gap-2 mb-3">
                                    <div
                                        class="bg-light rounded border border-secondary border-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 48px; height: 68px; overflow: hidden"
                                    >
                                        <img
                                            src="src/assets/img/pikachu.webp"
                                            alt="Pikachu"
                                            class="img-fluid w-100 h-100"
                                            style="object-fit: contain"
                                        />
                                    </div>
                                    <div
                                        class="bg-light rounded border border-secondary border-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 48px; height: 68px; overflow: hidden"
                                    >
                                        <img
                                            src="src/assets/img/lucario.webp"
                                            alt="Lucario"
                                            class="img-fluid w-100 h-100"
                                            style="object-fit: contain"
                                        />
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center text-muted small">
                                    <span>2 cartas</span>
                                    <span class="fw-bold" style="color: #9d4e54">15V - 5D</span>
                                </div>
                            </div>
                            <button class="btn btn-custom btn-custom-primary w-100 py-2.5 small fw-bold">
                                Deck Ativo
                            </button>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-4">
                        <div
                            class="custom-card h-100 bg-white border-0 d-flex flex-column justify-content-between p-4 shadow-sm position-relative"
                        >
                            <span
                                class="position-absolute end-0 top-0 mt-3 me-3 text-danger fs-5"
                                title="Deck Favoritado"
                                >❤️</span
                            >

                            <div class="mb-3">
                                <h3 class="h5 fw-bold mb-3" style="color: #532626; font-family: &quot;Outfit&quot;">
                                    Deck Água
                                </h3>

                                <div class="d-flex gap-2 mb-3">
                                    <div
                                        class="bg-light rounded border border-secondary border-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 48px; height: 68px; overflow: hidden"
                                    >
                                        <img
                                            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png"
                                            alt="Blastoise"
                                            class="img-fluid w-100 h-100"
                                            style="object-fit: contain"
                                        />
                                    </div>
                                    <div
                                        class="bg-light rounded border border-secondary border-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 48px; height: 68px; overflow: hidden"
                                    >
                                        <img
                                            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png"
                                            alt="Blastoise"
                                            class="img-fluid w-100 h-100"
                                            style="object-fit: contain"
                                        />
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center text-muted small">
                                    <span>2 cartas</span>
                                    <span class="fw-bold text-muted">12V - 8D</span>
                                </div>
                            </div>
                            <button class="btn btn-custom btn-custom-secondary w-100 py-2.5 small fw-bold">
                                Deixar Ativo
                            </button>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-4">
                        <div
                            class="custom-card h-100 bg-white border-0 d-flex flex-column justify-content-between p-4 shadow-sm position-relative"
                        >
                            <div class="mb-3">
                                <h3 class="h5 fw-bold mb-3" style="color: #532626; font-family: &quot;Outfit&quot;">
                                    Deck Fogo
                                </h3>

                                <div class="d-flex gap-2 mb-3">
                                    <div
                                        class="bg-light rounded border border-secondary border-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 48px; height: 68px; overflow: hidden"
                                    >
                                        <img
                                            src="src/assets/img/charizard.webp"
                                            alt="Charizard"
                                            class="img-fluid w-100 h-100"
                                            style="object-fit: contain"
                                        />
                                    </div>
                                    <div
                                        class="bg-light rounded border border-secondary border-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 48px; height: 68px; overflow: hidden"
                                    >
                                        <img
                                            src="src/assets/img/charmander.webp"
                                            alt="Charmander"
                                            class="img-fluid w-100 h-100"
                                            style="object-fit: contain"
                                        />
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center text-muted small">
                                    <span>2 cartas</span>
                                    <span class="fw-bold text-muted">20V - 3D</span>
                                </div>
                            </div>
                            <button class="btn btn-custom btn-custom-secondary w-100 py-2.5 small fw-bold">
                                Deixar Ativo
                            </button>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-4">
                        <div
                            class="custom-card h-100 bg-white border-0 d-flex flex-column justify-content-between p-4 shadow-sm position-relative"
                        >
                            <div class="mb-3">
                                <h3 class="h5 fw-bold mb-3" style="color: #532626; font-family: &quot;Outfit&quot;">
                                    Novo Deck
                                </h3>

                                <div class="d-flex gap-2 mb-3">
                                    <div
                                        class="bg-light rounded border border-2 border-dashed border-opacity-25 d-flex align-items-center justify-content-center text-muted small fw-bold opacity-50"
                                        style="width: 48px; height: 68px; border-color: #532626 !important"
                                    >
                                        ?
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center text-muted small">
                                    <span>0 cartas</span>
                                    <span class="fw-bold text-muted">0V - 0D</span>
                                </div>
                            </div>
                            <button class="btn btn-custom btn-custom-secondary w-100 py-2.5 small fw-bold">
                                Deixar Ativo
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div class="modal fade" id="addDeckModal" tabindex="-1" aria-labelledby="addDeckModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div
                    class="modal-content"
                    style="
                        border-radius: 1.5rem;
                        overflow: hidden;
                        border: none;
                        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
                    "
                >
                    <div
                        class="modal-header text-white"
                        style="background-color: #7a8f75; border-bottom: none; padding: 1.25rem 1.5rem"
                    >
                        <h5 class="modal-title fw-bold" id="addDeckModalLabel" style="font-family: &quot;Outfit&quot;">
                            Adicionar Novo Deck
                        </h5>
                        <button
                            type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                            aria-label="Fechar"
                        ></button>
                    </div>

                    <form action="#" id="addDeckForm">
                        <div class="modal-body p-4" style="background-color: #eaf2e8">
                            <div class="mb-3">
                                <label for="deckName" class="form-label fw-bold small" style="color: #532626"
                                    >Nome do Deck</label
                                >
                                <input
                                    type="text"
                                    id="deckName"
                                    class="form-control form-control-custom"
                                    placeholder="Ex: Deck Psíquico"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label for="deckType" class="form-label fw-bold small" style="color: #532626"
                                    >Classe do Deck</label
                                >
                                <select
                                    id="deckType"
                                    class="form-select form-control-custom text-muted small fw-semibold"
                                    required
                                >
                                    <option value="" disabled selected>Escolha o Tipo Principal</option>
                                    <option value="electric">Elétrico ⚡</option>
                                    <option value="fire">Fogo 🔥</option>
                                    <option value="water">Água 💧</option>
                                    <option value="grass">Planta 🍃</option>
                                    <option value="psychic">Psíquico 🔮</option>
                                </select>
                            </div>
                        </div>

                        <div class="modal-footer border-0 p-3" style="background-color: #eaf2e8">
                            <button
                                type="button"
                                class="btn btn-custom btn-custom-secondary btn-sm py-2 px-3 fw-bold"
                                data-bs-dismiss="modal"
                            >
                                Cancelar
                            </button>
                            <button
                                type="submit"
                                class="btn btn-custom btn-custom-primary btn-sm py-2 px-3 fw-bold shadow-sm"
                            >
                                Criar Deck
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <nav class="mobile-bottom-tabs d-md-none">
            <a href="index.html" class="tab-link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Home
            </a>
            <a href="cartas.html" class="tab-link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="9" rx="1" />
                    <rect x="14" y="3" width="7" height="5" rx="1" />
                    <rect x="14" y="12" width="7" height="9" rx="1" />
                    <rect x="3" y="16" width="7" height="5" rx="1" />
                </svg>
                Cartas
            </a>
            <a href="decks.html" class="tab-link active">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg>
                Decks
            </a>
        </nav>

        <footer class="text-center py-4 text-muted small d-none d-md-block">PokeDeck Studio &copy; 2026</footer>

        <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            document.getElementById("addDeckForm").addEventListener("submit", function (e) {
                e.preventDefault();
                const name = document.getElementById("deckName").value;
                alert('Deck "' + name + '" criado com sucesso no pokeDeck Studio! (Demonstração Funcional)');

                const modalEl = document.getElementById("addDeckModal");
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();

                document.getElementById("addDeckForm").reset();
            });
        </script>
    </body>
</html>
